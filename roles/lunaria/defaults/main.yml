---
# ============================================================================
# lunaria — wall-display compositor for the LXC 118 (pve4), serving the
# product now named lentago/brasenia (renamed from lentago/lunaria on
# 2026-07-20; 'lunaria' is the legacy runtime name, rename tracked in #63).
# Renders a TV-edition page from pub.lan (currently the runtime inventory)
# into a continuous H.264 HLS stream the Roku plays. Concept: docs/lunaria.md
# and http://pub.lan/brasenia/concept.md. Deliberately credential-free — pub
# owns the Google Drive leg; lunaria only reads http://pub.lan/.
# ============================================================================
lunaria_user: lunaria
lunaria_home: /var/lib/lunaria

# The clock overlay burned into the stream uses the system TZ; the debian
# template defaults to UTC, which reads as a broken clock on the TV.
lunaria_timezone: America/New_York

lunaria_mediamtx_version: v1.19.2
lunaria_mediamtx_dir: /opt/mediamtx

# Frame sources: the TV edition is preferred (exact 1280x720 screens); the
# full page is the fallback, sliced into 720px pages.
lunaria_tv_url: http://pub.lan/runtime-inventory/tv.html
lunaria_full_url: http://pub.lan/runtime-inventory/

# Seconds each screen stays up before rotating to the next.
lunaria_page_dwell: 12
# Seconds between re-renders of the source page.
lunaria_regen_interval: 600
