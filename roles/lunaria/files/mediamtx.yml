---
# lunaria HLS config - minimal.
# hlsVariant mpegts is CRITICAL for Roku compatibility: the default
# lowLatency variant uses LL-HLS/fMP4, which Roku handles poorly.
hls: true
hlsAddress: :8888
hlsVariant: mpegts
hlsSegmentDuration: 2s
hlsSegmentCount: 7
# Remux continuously so the first client join is fast.
hlsAlwaysRemux: true

rtsp: true
rtspAddress: :8554

# Only HLS out + RTSP in are used; keep the rest off.
rtmp: false
webrtc: false
srt: false
moq: false

paths:
  board:
