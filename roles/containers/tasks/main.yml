---
# ============================================================================
# containers — Docker Engine + Compose. The daemon/group steps are skipped on
# CLI-only profiles (Crostini). Debian installs from the Docker apt repo;
# Fedora from the Docker dnf repo — both pull the same docker_packages set
# from the OS-family var map.
# ============================================================================
- name: Set up Docker from the official apt repository (Debian)
  when: ansible_os_family == "Debian"
  become: true
  block:
    - name: Ensure the apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add the Docker GPG key
      ansible.builtin.get_url:
        url: "{{ docker_apt_repo_url }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add the Docker apt repository
      ansible.builtin.deb822_repository:
        name: docker
        types: [deb]
        uris: "{{ docker_apt_repo_url }}"
        suites: "{{ ansible_distribution_release }}"
        components: [stable]
        architectures: "{{ deb_arch }}"
        signed_by: /etc/apt/keyrings/docker.asc
        state: present

    - name: Install Docker Engine + Compose plugin
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: true

- name: Set up Docker from the official dnf repository (Fedora)
  when: ansible_os_family == "RedHat"
  become: true
  block:
    - name: Import the Docker GPG key
      ansible.builtin.rpm_key:
        key: "{{ docker_dnf_repo_url }}/gpg"
        state: present

    - name: Add the Docker dnf repository
      ansible.builtin.yum_repository:
        name: docker-ce-stable
        description: Docker CE Stable - $basearch
        baseurl: "{{ docker_dnf_repo_url }}/$releasever/$basearch/stable"
        gpgcheck: true
        gpgkey: "{{ docker_dnf_repo_url }}/gpg"
        enabled: true

    - name: Install Docker Engine + Compose plugin
      ansible.builtin.dnf:
        name: "{{ docker_packages }}"
        state: present

- name: Add the user to the docker group
  ansible.builtin.user:
    name: "{{ target_user }}"
    groups: docker
    append: true
  become: true
  when: docker_daemon | bool

- name: Enable and start the Docker daemon
  ansible.builtin.systemd_service:
    name: docker
    enabled: true
    state: started
  become: true
  when: docker_daemon | bool
